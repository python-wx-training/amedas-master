// ======================================================
// ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼
//   埋め込み JSON ここまで
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲
// ======================================================

// ▼ 十進法変換
function toDecimal(deg, min) {
  return deg + min / 60;
}

// ▼ elems デコード（公式仕様に完全準拠）
function decodeElems(e) {
  return {
    temp:    e[0] === "1",                 // 1桁目：気温
    rain:    e[1] === "1",                 // 2桁目：降水量
    windDir: e[2] === "1",                 // 3桁目：風向
    windSpd: e[3] === "1",                 // 4桁目：風速
    sun:     e[4] === "1" || e[4] === "2", // 5桁目：日照（2=推計値）
    snow:    e[5] === "1",                 // 6桁目：積雪深
    hum:     e[6] === "1",                 // 7桁目：湿度
    pres:    e[7] === "1"                  // 8桁目：気圧
  };
}

// ▼ 種別 → 日本語
function typeToJapanese(t) {
  switch (t) {
    case "A": return "気象台";
    case "B": return "特別気象観測所";
    case "C": return "アメダス";
    case "D": return "父島";
    case "E": return "南鳥島";
    case "F": return "富士山";
    default:  return t;
  }
}

// ▼ 地域リスト初期化
function initRegionList() {
  const regionSet = new Set();
  Object.values(stations).forEach(s => regionSet.add(s.region || ""));

  const regionSelect = document.getElementById("regionSelect");
  [...regionSet].forEach(r => {
    const opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r === "" ? "地域なし（積雪専用など）" : r;
    regionSelect.appendChild(opt);
  });
}

// ▼ 観測所リスト更新（地域だけで絞る）
function updateStationList() {
  const region = document.getElementById("regionSelect").value;
  const stationSelect = document.getElementById("stationSelect");

  stationSelect.innerHTML = '<option value="">観測所を選択</option>';

  Object.entries(stations).forEach(([id, s]) => {
    if (s.region !== region) return;

    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = s.name;
    stationSelect.appendChild(opt);
  });
}

// ▼ 情報カード表示（elems 横並び + 種別日本語）
function showInfo(s) {
  const lat = toDecimal(s.lat_deg, s.lat_min).toFixed(6);
  const lon = toDecimal(s.lon_deg, s.lon_min).toFixed(6);

  const elems = decodeElems(s.elems);

  const mark = v => v ? `<span class="mark-yes">〇</span>`
                      : `<span class="mark-no">×</span>`;

  const sunMark = s.elems[4] === "2"
      ? `<span class="mark-yes">推計値</span>`
      : mark(elems.sun);

  document.getElementById("info").innerHTML = `
    <h3>${s.display_name}</h3>
    <div class="info-grid">
      <div class="info-item"><b>ID:</b> ${s.station_id}</div>
      <div class="info-item"><b>種別:</b> ${typeToJapanese(s.type)}</div>
      <div class="info-item"><b>地域:</b> ${s.region}</div>

      <div class="info-item"><b>住所:</b> ${s.address}</div>
      <div class="info-item"><b>緯度:</b> ${lat}°</div>
      <div class="info-item"><b>経度:</b> ${lon}°</div>

      <div class="info-item"><b>標高:</b> ${s.altitude_m} m</div>
      <div class="info-item"><b>風速計:</b> ${s.anemometer_height_m} m</div>
      <div class="info-item"><b>温度計:</b> ${s.thermometer_height_m} m</div>

      <div class="info-item"><b>開始日:</b> ${s.start_date}</div>
      <div class="info-item"><b>備考1:</b> ${s.note1}</div>
      <div class="info-item"><b>備考2:</b> ${s.note2}</div>
    </div>

    <!-- ▼▼▼ elems 一覧（横並び） ▼▼▼ -->
    <div class="elems-box">
      <b>観測項目一覧：</b>
      気温: ${mark(elems.temp)}, 
      降水量: ${mark(elems.rain)}, 
      風向: ${mark(elems.windDir)}, 
      風速: ${mark(elems.windSpd)}, 
      日照: ${sunMark}, 
      積雪深: ${mark(elems.snow)}, 
      湿度: ${mark(elems.hum)}, 
      気圧: ${mark(elems.pres)}
    </div>
    <!-- ▲▲▲ elems 一覧 ▲▲▲ -->
  `;
}

// ▼ 地図初期化
const map = L.map('map').setView([35, 135], 5);

L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '地理院タイル（淡色）'
}).addTo(map);

L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/boundary/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '地理院タイル（境界）'
}).addTo(map);

let marker = null;

// ▼ 観測所選択時
document.getElementById("stationSelect").addEventListener("change", () => {
  const id = document.getElementById("stationSelect").value;
  if (!id) {
    document.getElementById("info").innerHTML = "";
    return;
  }

  const s = stations[id];
  showInfo(s);

  const lat = toDecimal(s.lat_deg, s.lat_min);
  const lon = toDecimal(s.lon_deg, s.lon_min);

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lon]).addTo(map);

  const delta = 1.0;
  map.fitBounds([
    [lat - delta, lon - delta],
    [lat + delta, lon + delta]
  ]);
});

// ▼ イベント
document.getElementById("regionSelect").addEventListener("change", updateStationList);

// ▼ 初期化
initRegionList();

</script>
